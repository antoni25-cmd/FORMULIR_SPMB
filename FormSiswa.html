<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aplikasi Pendataan Siswa</title>
  
  <!-- React & Babel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
  
  <!-- SheetJS untuk Export Excel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    :root {
      --primary-color: #4f46e5;
      --primary-hover: #4338ca;
      --bg-color: #f3f4f6;
      --surface-color: #ffffff;
      --text-primary: #111827;
      --text-secondary: #4b5563;
      --border-color: #e5e7eb;
      --input-bg: #f9fafb;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      --radius-md: 0.375rem;
      --radius-lg: 0.5rem;
    }

    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    .header-title {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary-color);
      text-align: center;
      margin-bottom: 2rem;
      text-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    .card {
      background-color: var(--surface-color);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      padding: 2rem;
      margin-bottom: 2rem;
      border: 1px solid var(--border-color);
    }

    .card-title {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-primary);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1.25rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .form-label {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .form-input, .form-select {
      padding: 0.625rem 0.75rem;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      background-color: var(--input-bg);
      font-size: 0.875rem;
      color: var(--text-primary);
      transition: all 0.2s ease;
    }

    .form-input:focus, .form-select:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
      background-color: var(--surface-color);
    }

    .form-input:hover, .form-select:hover {
      border-color: #a5b4fc;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.625rem 1.25rem;
      font-weight: 500;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      font-size: 0.875rem;
    }

    .btn-primary {
      background-color: var(--primary-color);
      color: white;
      box-shadow: var(--shadow-sm);
    }

    .btn-primary:hover {
      background-color: var(--primary-hover);
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .btn-success {
      background-color: #10b981;
      color: white;
      box-shadow: var(--shadow-sm);
    }

    .btn-success:hover {
      background-color: #059669;
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .form-actions {
      margin-top: 2rem;
      display: flex;
      justify-content: flex-end;
    }

    .table-container {
      overflow-x: auto;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow-sm);
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 0.875rem;
      white-space: nowrap;
    }

    .data-table th {
      background-color: #f8fafc;
      padding: 1rem;
      font-weight: 600;
      color: var(--text-secondary);
      border-bottom: 2px solid var(--border-color);
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
    }

    .data-table td {
      padding: 0.875rem 1rem;
      border-bottom: 1px solid var(--border-color);
      color: var(--text-primary);
    }

    .data-table tbody tr {
      transition: background-color 0.15s;
    }

    .data-table tbody tr:hover {
      background-color: #f1f5f9;
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-secondary);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .empty-state-icon {
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const FIELDS = [
      { id: 'nisn', label: 'NISN', type: 'text' },
      { id: 'nkk', label: 'NKK', type: 'text' },
      { id: 'nik', label: 'NIK', type: 'text' },
      { id: 'nama', label: 'NAMA', type: 'text' },
      { id: 'jenis_kelamin', label: 'JENIS KELAMIN', type: 'select', options: ['Laki-laki', 'Perempuan'] },
      { id: 'tempat_lahir', label: 'TEMPAT LAHIR', type: 'text' },
      { id: 'tanggal_lahir', label: 'TANGGAL LAHIR', type: 'date' },
      { id: 'no_hp_siswa', label: 'NO HP SISWA', type: 'text' },
      { id: 'agama', label: 'AGAMA', type: 'select', options: ['Islam', 'Kristen', 'Katolik', 'Hindu', 'Buddha', 'Konghucu', 'Lainnya'] },
      { id: 'anak_ke', label: 'ANAK KE', type: 'number' },
      { id: 'dari_bersaudara', label: 'DARI BERSAUDARA', type: 'number' },
      { id: 'nama_ayah', label: 'NAMA AYAH', type: 'text' },
      { id: 'nama_ibu', label: 'NAMA IBU', type: 'text' },
      { id: 'pekerjaan_ayah', label: 'PEKERJAAN AYAH', type: 'text' },
      { id: 'pekerjaan_ibu', label: 'PEKERJAAN IBU', type: 'text' },
      { id: 'no_hp_orang_tua', label: 'NO HP ORANG TUA', type: 'text' },
      { id: 'dusun', label: 'DUSUN', type: 'text' },
      { id: 'rt', label: 'RT', type: 'text' },
      { id: 'rw', label: 'RW', type: 'text' },
      { id: 'desa', label: 'DESA', type: 'text' },
      { id: 'kecamatan', label: 'KECAMATAN', type: 'text' },
      { id: 'berat_badan', label: 'BERAT BADAN', type: 'number' },
      { id: 'tinggi_badan', label: 'TINGGI BADAN', type: 'number' },
      { id: 'jarak_rumah_ke_sekolah', label: 'JARAK RUMAH KE SEKOLAH', type: 'number' },
      { id: 'cita_cita', label: 'CITA-CITA', type: 'text' },
      { id: 'no_kip', label: 'NO KIP', type: 'text' },
      { id: 'no_pkh', label: 'NO PKH', type: 'text' },
    ];

    function App() {
      const [dataList, setDataList] = useState([]);
      const [formData, setFormData] = useState({});

      useEffect(() => {
        const saved = localStorage.getItem('dataSiswa');
        if (saved) {
          try {
            setDataList(JSON.parse(saved));
          } catch (e) {
            console.error("Failed to parse saved data", e);
          }
        }
      }, []);

      const handleChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({ ...prev, [name]: value }));
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        const newData = { ...formData, id: Date.now() };
        const updatedList = [...dataList, newData];
        setDataList(updatedList);
        localStorage.setItem('dataSiswa', JSON.stringify(updatedList));
        setFormData({});
        e.target.reset();
        alert('Data berhasil disimpan!');
      };

      const exportToExcel = () => {
        if (dataList.length === 0) {
          alert('Tidak ada data untuk diekspor!');
          return;
        }
        
        const excelData = dataList.map((item, index) => {
          const row = { NO: index + 1 };
          FIELDS.forEach(field => {
            row[field.label] = item[field.id] || '';
          });
          return row;
        });

        const worksheet = XLSX.utils.json_to_sheet(excelData);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, 'Data Siswa');
        XLSX.writeFile(workbook, 'Data_Siswa.xlsx');
      };

      const deleteData = (id) => {
        if(window.confirm('Yakin ingin menghapus data ini?')) {
          const updatedList = dataList.filter(item => item.id !== id);
          setDataList(updatedList);
          localStorage.setItem('dataSiswa', JSON.stringify(updatedList));
        }
      };

      return (
        <div className="container">
          <h1 className="header-title">Sistem Pendataan Siswa</h1>
          
          <div className="card">
            <h2 className="card-title">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
              Formulir Input Data Siswa
            </h2>
            <form onSubmit={handleSubmit}>
              <div className="form-grid">
                {FIELDS.map(field => (
                  <div key={field.id} className="form-group">
                    <label className="form-label" htmlFor={field.id}>{field.label}</label>
                    {field.type === 'select' ? (
                      <select 
                        id={field.id} 
                        name={field.id} 
                        className="form-select" 
                        onChange={handleChange}
                        value={formData[field.id] || ''}
                        required
                      >
                        <option value="">-- Pilih {field.label} --</option>
                        {field.options.map(opt => (
                          <option key={opt} value={opt}>{opt}</option>
                        ))}
                      </select>
                    ) : (
                      <input
                        type={field.type}
                        id={field.id}
                        name={field.id}
                        className="form-input"
                        onChange={handleChange}
                        value={formData[field.id] || ''}
                        placeholder={`Masukkan ${field.label}`}
                        required={['nama', 'nisn', 'nik'].includes(field.id)}
                      />
                    )}
                  </div>
                ))}
              </div>
              <div className="form-actions">
                <button type="submit" className="btn btn-primary">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                  Simpan Data
                </button>
              </div>
            </form>
          </div>

          <div className="card">
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem', flexWrap: 'wrap', gap: '1rem' }}>
              <h2 className="card-title" style={{ marginBottom: 0 }}>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
                Daftar Siswa Tersimpan ({dataList.length})
              </h2>
              <button type="button" onClick={exportToExcel} className="btn btn-success">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
                Export ke Excel
              </button>
            </div>

            {dataList.length === 0 ? (
              <div className="empty-state">
                <svg className="empty-state-icon" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
                <p>Belum ada data siswa yang ditambahkan.</p>
              </div>
            ) : (
              <div className="table-container">
                <table className="data-table">
                  <thead>
                    <tr>
                      <th>NO</th>
                      <th>Aksi</th>
                      {FIELDS.map(f => <th key={f.id}>{f.label}</th>)}
                    </tr>
                  </thead>
                  <tbody>
                    {dataList.map((row, idx) => (
                      <tr key={row.id}>
                        <td>{idx + 1}</td>
                        <td>
                          <button 
                            onClick={() => deleteData(row.id)} 
                            style={{ background: '#ef4444', color: 'white', border: 'none', padding: '4px 8px', borderRadius: '4px', cursor: 'pointer', fontSize: '12px' }}
                          >
                            Hapus
                          </button>
                        </td>
                        {FIELDS.map(f => (
                          <td key={f.id}>{row[f.id] || '-'}</td>
                        ))}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
